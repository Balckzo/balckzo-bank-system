<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Balckzo® - Transferência</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #000; color: white; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 90vh; }
        .header { border-bottom: 2px solid #00ffff; padding-bottom: 10px; margin-bottom: 20px; text-align: center; width: 100%; max-width: 400px; }
        .cyan { color: #00ffff; }
        .card { background: #111; border: 1px solid #333; padding: 25px; border-radius: 8px; width: 100%; max-width: 400px; }
        label { color: #ccc; font-weight: bold; display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; background: #222; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        input:focus { border-color: #00ffff; outline: none; }
        .btn-submit { width: 100%; background: #00ffff; color: #000; border: none; padding: 15px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #ff00ff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📲 <span class="cyan">Enviar</span> Transferência</h1>
    </div>
    <div class="card">
        <form action="/transferir" method="POST">
            <label>ID do destinatário:</label>
            <input type="number" name="id_destino" maxlength="11" required placeholder="Apenas números">
            
            <label>Valor (R$):</label>
            <input type="number" name="valor" step="0.01" min="0.01" required placeholder="0.00">
            
            <button type="submit" class="btn-submit">Transferir Agora</button>
        </form>
        <a href="/painel" class="back-link">Cancelar</a>
    </div>
</body>
</html>
